spring:
  application:
    name: mastermind-backend
  datasource:
    url: jdbc:h2:file:./data/mastermind;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: admin
    password: admin
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.H2Dialect

server:
  port: 8080
  servlet:
    context-path: /api

app:
  jwt:
    secret: ${JWT_SECRET:MastermindItauSecretKeyParaAssinaturaDoToken2024Seguro}
    expiration-ms: 86400000
  mastermind:
    code-length: 4
    max-attempts: 10
    colors: "R,G,B,Y,O,P"

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
